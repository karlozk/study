name: Hello Workflow

on: push

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: Print Hello
        run: |
              echo "Hello from GitHub Actions!"
              echo $((1 + 2))

  nice:
    runs-on: ubuntu-latest
    needs: hello
    steps:
      - name: Print Hello
        
        run: |
              echo "mast ch!"
              echo $((1 + 7))

